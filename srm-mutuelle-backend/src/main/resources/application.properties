spring.application.name=srm-mutuelle-backend
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/srm_mutuelle}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (HS256) — utiliser JWT_SECRET d'au moins 32 caractères en production
app.jwt.secret=${JWT_SECRET:srm-ms-dev-jwt-secret-key-change-me-32b!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS pour le front Vite (liste séparée par des virgules)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
