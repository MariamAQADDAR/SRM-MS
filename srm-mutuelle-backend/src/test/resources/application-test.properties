spring.flyway.enabled=false
spring.datasource.url=jdbc:h2:mem:srmtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=srm-ms-test-jwt-secret-key-32bytes-min!!
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:5173
app.mutual-cards.storage-dir=${java.io.tmpdir}/srm-ms-test-mutual-cards
